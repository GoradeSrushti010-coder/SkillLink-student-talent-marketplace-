 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillBridge Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#2563eb,#7c3aed);
overflow:hidden;
}

.left-panel{
background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.branding{
color:#fff;
}

.branding h1{
font-size:55px;
font-weight:700;
}

.branding h3{
margin-top:10px;
font-weight:300;
}

.branding p{
margin-top:20px;
font-size:18px;
line-height:28px;
}

.branding ul{
list-style:none;
padding:0;
margin-top:35px;
}

.branding ul li{
margin:15px 0;
font-size:18px;
}

.branding i{
color:#00ff99;
margin-right:10px;
}

.login-card{

width:430px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
padding:40px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.3);

}

.logo-icon{

font-size:70px;
color:#2563eb;
margin-bottom:15px;

}

.login-card h2{

font-weight:bold;

}

.login-card p{

color:#555;

}

.input-group-text{

background:#2563eb;
color:#fff;
border:none;

}

.form-control{

height:50px;
border:none;

}

.form-control:focus{

box-shadow:none;
border:2px solid #2563eb;

}

.login-btn{

height:50px;
font-size:18px;
font-weight:bold;
border-radius:10px;
transition:.3s;

}

.login-btn:hover{

transform:translateY(-3px);

}

a{

text-decoration:none;

}

a:hover{

text-decoration:underline;

}

@media(max-width:992px){

.left-panel{

display:none;

}

.login-card{

width:95%;
margin:20px;

}

body{

overflow:auto;

}

}

@media(max-width:576px){

.login-card{

padding:25px;

}

.logo-icon{

font-size:55px;

}

.login-card h2{

font-size:28px;

}

.branding h1{

font-size:35px;

}

}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row vh-100">

<!-- Left Side -->

<div class="col-lg-6 left-panel">

<div class="overlay">

<div class="branding">

<h1>SkillBridge</h1>

<h3>Student Portal</h3>

<p>

Connect Local Customers with Skilled Students

</p>

<ul>

<li><i class="fa fa-check-circle"></i> Student Verification</li>

<li><i class="fa fa-check-circle"></i> Digital ID Card</li>

<li><i class="fa fa-check-circle"></i> Skill Management</li>

<li><i class="fa fa-check-circle"></i> Portfolio Showcase</li>

</ul>

</div>

</div>

</div>

<!-- Right Side -->

<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="login-card">

<div class="text-center mb-4">

<i class="fa-solid fa-user-graduate logo-icon"></i>

<h2>Welcome Back</h2>

<p>

Login to your Student Account

</p>

</div>

<form id="loginForm">

<div class="mb-3">

<label>Email Address</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa fa-envelope"></i>

</span>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter Email"
required>

</div>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa fa-lock"></i>

</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Enter Password"
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword()">

<i class="fa fa-eye"></i>

</button>

</div>

</div>

<div class="d-flex justify-content-between mb-3">

<div>

<input type="checkbox">

Remember Me

</div>

<a href="#">

Forgot Password?

</a>

</div>

<button
class="btn btn-primary w-100 login-btn"
type="submit">

Login

</button>

</form>

<hr>

<div class="text-center">

Don't have an account?

<a href="register.html">

Register Now

</a>

</div>

</div>

</div>

</div>

</div>

<script>

<script>

// ===============================
// Show / Hide Password
// ===============================

function togglePassword(){

    const password = document.getElementById("password");

    if(password.type === "password"){

        password.type = "text";

    }else{

        password.type = "password";

    }

}

// ===============================
// Login
// ===============================

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value.trim();

    const password = document.getElementById("password").value.trim();

    if(email==="" || password===""){

        alert("Please fill all fields.");

        return;

    }

    // Get Registered Student
    const student = JSON.parse(localStorage.getItem("student"));

    if(student){

        if(student.email===email && student.password===password){

            // Save Login Session
            localStorage.setItem("isLoggedIn","true");

            alert("Login Successful");

            window.location.href="dashboard.html";

        }else{

            alert("Invalid Email or Password");

        }

    }else{

        alert("No Account Found.\nPlease Register First.");

    }

});

// ===============================
// Already Logged In
// ===============================

if(localStorage.getItem("isLoggedIn")==="true"){

    console.log("Student Already Logged In");

}

</script>
</script>

</body>

</html>
