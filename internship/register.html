<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration | SkillBridge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#2563eb,#7c3aed);
overflow-x:hidden;
}

.left-panel{
background:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
position:relative;
min-height:100vh;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.60);
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.content{
color:#fff;
}

.content h1{
font-size:52px;
font-weight:700;
margin-bottom:15px;
}

.content p{
font-size:18px;
line-height:30px;
margin-bottom:30px;
}

.content ul{
list-style:none;
padding:0;
}

.content ul li{
margin:15px 0;
font-size:18px;
}

.content i{
color:#00ff99;
margin-right:10px;
}

.register-card{

width:90%;
max-width:750px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

padding:40px;

border-radius:25px;

border:1px solid rgba(255,255,255,.25);

box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.register-card h2{

font-weight:bold;
margin-bottom:25px;
text-align:center;
color:#fff;

}

label{

font-weight:600;
margin-bottom:5px;
color:#fff;

}

.form-control,
.form-select{

height:48px;
border-radius:10px;

}

textarea.form-control{

height:auto;

}

.form-control:focus,
.form-select:focus{

border-color:#2563eb;
box-shadow:0 0 8px rgba(37,99,235,.25);

}

.btn-primary{

height:50px;
font-size:18px;
font-weight:bold;
border-radius:10px;
transition:.3s;

}

.btn-primary:hover{

transform:translateY(-3px);

}

a{

text-decoration:none;

}

a:hover{

text-decoration:underline;

}

@media(max-width:992px){

.left-panel{

display:none;

}

.register-card{

margin:20px;
width:95%;

}

}

@media(max-width:576px){

.register-card{

padding:25px;

}

.register-card h2{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row vh-100">

<!-- Left Panel -->

<div class="col-lg-5 left-panel">

<div class="overlay">

<div class="content">

<h1>Join SkillBridge</h1>

<p>

Create your student account and start showcasing your skills.

</p>

<ul>

<li><i class="fa fa-check-circle"></i> Digital Student ID</li>

<li><i class="fa fa-check-circle"></i> Verification System</li>

<li><i class="fa fa-check-circle"></i> Portfolio Management</li>

<li><i class="fa fa-check-circle"></i> Local Service Opportunities</li>

</ul>

</div>

</div>

</div>

<!-- Right Panel -->

<div class="col-lg-7 d-flex justify-content-center align-items-center py-5">

<div class="register-card">

<h2 class="text-center mb-4">

Student Registration

</h2>

<!-- Alert Message Box -->
<div id="alertBox" class="alert d-none"></div>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter Full Name" required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter Email" required>

</div>

<div class="col-md-6 mb-3">

<label>Mobile Number</label>

<input
type="text"
id="phone"
class="form-control"
placeholder="Enter Mobile" required>

</div>

<div class="col-md-6 mb-3">

<label>Primary Skill / Expertise</label>

<select id="primarySkill" class="form-select" required>

<option value="">Select Primary Skill</option>

<option value="Photography 📷">Photography 📷</option>

<option value="Video Editing 🎬">Video Editing 🎬</option>

<option value="Sketch Arts ✏️">Sketch Arts ✏️</option>

<option value="Electrician ⚡">Electrician ⚡</option>

<option value="Mehandi Artist ✒">Mehandi Artist ✒</option>

<option value="Computer Repair 💻">Computer Repair 💻</option>

<option value="Painting 🎨">Painting 🎨</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>College Name</label>

<input
type="text"
id="college"
class="form-control"
placeholder="College Name" required>

</div>

<div class="col-md-6 mb-3">

<label>Department</label>

<select id="department" class="form-select">

<option>Computer Engineering</option>

<option>Electronics & Telecommunication</option>

<option>Mechanical Engineering</option>

<option>Civil Engineering</option>

<option>Electrical Engineering</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Year</label>

<select id="year" class="form-select">

<option>First Year</option>

<option>Second Year</option>

<option>Third Year</option>

<option>Final Year</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>College ID Proof (ID Image)</label>

<input
type="file"
id="idProof"
class="form-control"
accept="image/*">

</div>

<div class="col-12 mb-3">

<label>Address</label>

<textarea
id="address"
class="form-control"
rows="3"
placeholder="Enter Address" required></textarea>

</div>

<div class="col-md-6 mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Password" required>

</div>

<div class="col-md-6 mb-3">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm Password" required>

</div>

<div class="col-12 mb-3">

<label>Profile Photo</label>

<input
type="file"
id="photo"
class="form-control"
accept="image/*">

</div>

<div class="col-12">

<button
type="submit"
class="btn btn-primary w-100">

Create Account

</button>

</div>

</div>

</form>

<hr class="text-white">

<p class="text-center text-white mb-0">

Already have an account?

<a href="student.html" class="text-warning fw-bold">

Login Here

</a>

</p>

</div>

</div>

</div>

</div>

<script src="API.js"></script>

<script>

let collegeIdProofBase64 = "College_ID_Proof.png";

document.getElementById("idProof").addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){ collegeIdProofBase64 = e.target.result; }
        reader.readAsDataURL(file);
    }
});

const registerForm = document.getElementById("registerForm");

registerForm.addEventListener("submit", async function(e){

    e.preventDefault();

    const alertBox = document.getElementById("alertBox");

    alertBox.classList.add("d-none");

    const name = document.getElementById("name").value.trim();

    const email = document.getElementById("email").value.trim();

    const phone = document.getElementById("phone").value.trim();

    const primarySkill = document.getElementById("primarySkill").value;

    const college = document.getElementById("college").value.trim();

    const department = document.getElementById("department").value;

    const year = document.getElementById("year").value;

    const address = document.getElementById("address").value.trim();

    const password = document.getElementById("password").value;

    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){

        alertBox.className = "alert alert-danger";

        alertBox.innerText = "Passwords do not match.";

        alertBox.classList.remove("d-none");

        return;

    }

    const payload = {

        full_name: name,

        email: email,

        phone: phone,

        primary_skill: primarySkill,

        college: college,

        department: department,

        year: year,

        address: address,

        password: password,

        college_id_proof: collegeIdProofBase64,

        role: 'student'

    };

    try {

        const res = await SkillLinkAPI.register(payload);

        alertBox.className = "alert alert-success";

        alertBox.innerText = res.message;

        alertBox.classList.remove("d-none");

        setTimeout(() => {

            window.location.href = "student.html";

        }, 1500);

    } catch (err) {

        alertBox.className = "alert alert-danger";

        alertBox.innerText = err.message || "Registration failed.";

        alertBox.classList.remove("d-none");

    }

});

</script>

</body>

</html>
