<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | SkillLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#2563eb,#7c3aed); min-height: 100vh; }
        .login-card {
            width: 420px;
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,.25);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="login-card text-center">
    <i class="fa-solid fa-user-graduate text-primary display-4 mb-3"></i>
    <h3 class="fw-bold mb-1">Student Portal</h3>
    <p class="text-muted mb-4">Login to manage your skills & earnings</p>

    <div id="alertBox" class="alert d-none"></div>

    <form id="loginForm" class="text-start">
        <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="bhakti@gmail.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow">Login to Dashboard</button>
    </form>

    <hr class="my-4">
    <p class="mb-0 text-muted">Don't have an account? <a href="register.html" class="fw-bold text-primary">Register Now</a></p>
</div>

<script src="API.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    alertBox.classList.add('d-none');
    
    try {
        const res = await SkillLinkAPI.login(
            document.getElementById('email').value,
            document.getElementById('password').value
        );

        if (res.user.role !== 'student') {
            throw new Error("This portal is restricted to students only.");
        }

        SkillLinkAPI.setSession(res.token, res.user);
        alertBox.className = "alert alert-success";
        alertBox.innerText = "Login Successful! Redirecting...";
        setTimeout(() => window.location.href = '/student-dashboard.html', 1000);
    } catch (err) {
        alertBox.className = "alert alert-danger";
        alertBox.innerText = err.message || "Invalid email or password.";
    }
});
</script>
</body>
</html>
